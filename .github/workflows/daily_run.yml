name: Corrida diaria de precios

on:
  schedule:
    # Lunes a viernes a las 21:00 UTC (3 PM CT / 4 PM ET — cierre de mercado)
    - cron: '0 21 * * 1-5'
  workflow_dispatch:  # permite lanzarlo manualmente desde GitHub

jobs:
  actualizar_historico:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # necesario para hacer git push al repo

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar pipeline de precios
        run: python run.py

      - name: Guardar CSV actualizado en el repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/historico.csv
          git diff --staged --quiet || git commit -m "data: actualizar historico $(date +%Y-%m-%d)"
          git push
